services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-keeply}
      POSTGRES_USER: ${POSTGRES_ADMIN_USER:-keeply_admin}
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD:?Set POSTGRES_ADMIN_PASSWORD in .env}
    volumes:
      - keeply_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  migrate:
    image: ${KEEPLY_IMAGE:-docker.io/your-dockerhub-user/keeply}:${KEEPLY_TAG:-0.1.0}
    pull_policy: always
    command: ["node", "scripts/migrate.mjs"]
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-keeply}
      PGUSER: ${POSTGRES_ADMIN_USER:-keeply_admin}
      PGPASSWORD: ${POSTGRES_ADMIN_PASSWORD:?Set POSTGRES_ADMIN_PASSWORD in .env}
      DATABASE_APP_PASSWORD: ${DATABASE_APP_PASSWORD:?Set DATABASE_APP_PASSWORD in .env}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  keeply:
    image: ${KEEPLY_IMAGE:-docker.io/your-dockerhub-user/keeply}:${KEEPLY_TAG:-0.1.0}
    pull_policy: always
    ports:
      - "${KEEPLY_PORT:-3000}:3000"
    environment:
      PGHOST: postgres
      PGPORT: 5432
      PGDATABASE: ${POSTGRES_DB:-keeply}
      PGUSER: keeply_app
      PGPASSWORD: ${DATABASE_APP_PASSWORD:?Set DATABASE_APP_PASSWORD in .env}
      PG_POOL_MAX: ${PG_POOL_MAX:-10}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET in .env}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      TRUSTED_ORIGINS: ${TRUSTED_ORIGINS:-http://localhost:3000}
      AUTH_DISABLE_SIGNUP: ${AUTH_DISABLE_SIGNUP:-false}
      BACKUP_ENCRYPTION_KEY: ${BACKUP_ENCRYPTION_KEY:-}
      OCR_PROVIDER: ${OCR_PROVIDER:-disabled}
      OCR_API_KEY: ${OCR_API_KEY:-}
      OCR_API_URL: ${OCR_API_URL:-}
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    init: true
    restart: unless-stopped

volumes:
  keeply_postgres:
